# Nginx 反向代理配置（TLS 终端 + 静态资源缓存）
# 安装: apt install nginx
# 启用: ln -s /etc/nginx/sites-available/cronix /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name cronix.example.com;
    return 301 https://$host$request_uri;  # HTTP 强制跳转 HTTPS
}

server {
    listen 443 ssl http2;
    server_name cronix.example.com;

    # TLS 证书（用 certbot 申请免费 Let's Encrypt 证书）
    ssl_certificate     /etc/letsencrypt/live/cronix.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cronix.example.com/privkey.pem;

    # 安全头
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;

    # 代理到 Cronix
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 静态资源浏览器缓存 30 天（文件名带哈希，改内容即改文件名）
    location /assets/ {
        proxy_pass http://127.0.0.1:8080;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 日志
    access_log /var/log/nginx/cronix-access.log;
    error_log  /var/log/nginx/cronix-error.log;
}
