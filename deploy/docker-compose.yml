# Cronix Docker Compose 部署
# 用法: docker compose up -d

version: "3.8"

services:
  cronix:
    build: .
    container_name: cronix
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - ./config.yaml:/app/config.yaml:ro  # 配置文件只读
      - cronix-data:/app/data               # 数据库持久化
    environment:
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    # 资源限制
    deploy:
      resources:
        limits:
          memory: 512M
    # 安全加固
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

volumes:
  cronix-data:
