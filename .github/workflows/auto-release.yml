name: Auto Bump & Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type (patch, minor, major)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  auto-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Git config"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: "Get latest tag and bump version"
        id: bump
        run: |
          # Get latest tag, or fallback to v0.0.0
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST_TAG"
          
          # Remove 'v' prefix
          VERSION=${LATEST_TAG#v}
          IFS='.' read -r -a PARTS <<< "$VERSION"
          MAJOR=${PARTS[0]:-0}
          MINOR=${PARTS[1]:-0}
          PATCH=${PARTS[2]:-0}
          
          BUMP="${{ github.event.inputs.bump }}"
          if [ "$BUMP" = "major" ]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif [ "$BUMP" = "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi
          
          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "Bumping from $LATEST_TAG to $NEW_TAG"

      - name: "Tag the commit"
        run: |
          NEW_TAG="${{ steps.bump.outputs.new_tag }}"
          git tag $NEW_TAG
          git push origin $NEW_TAG

      # ================== 编译阶段 ==================
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: "Build frontend"
        working-directory: web
        run: |
          npm install
          npm run build

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: "Build Go backend"
        run: |
          NEW_TAG="${{ steps.bump.outputs.new_tag }}"
          go build -ldflags="-s -w -X cronix/cmd.Version=$NEW_TAG" -o cronix-linux-amd64 .

      # ================== 发布阶段 ==================
      - name: "Create Release and upload binary"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.new_tag }}
          name: "Cronix ${{ steps.bump.outputs.new_tag }}"
          body: "Auto-generated release from GitHub Actions. Linux amd64 binary. See README for deployment instructions."
          files: cronix-linux-amd64
